const grid = document.getElementById('grid');
const fmt = n => (n||0).toLocaleString('es-ES');

function chip(label, val){
  if(val === true) return `<span class="chip on">✓ ${label}</span>`;
  if(val === false) return `<span class="chip no">✗ ${label}</span>`;
  return `<span class="chip">${label}?</span>`;
}

function render(){
  const q = document.getElementById('q').value.toLowerCase().trim();
  const pmax = parseFloat(document.getElementById('pmax').value);
  const mmin = parseFloat(document.getElementById('mmin').value);
  const mmax = parseFloat(document.getElementById('mmax').value);
  const fD = document.getElementById('fDiesel').checked;
  const fI = document.getElementById('fIntra').checked;
  const fF = document.getElementById('fFibra').checked;
  const fH = document.getElementById('fHab').checked;
  const orden = document.getElementById('orden').value;

  let list = BARCOS.filter(b=>{
    if(q){ const t=(b.titulo+' '+b.make+' '+b.ubicacion).toLowerCase(); if(!t.includes(q)) return false; }
    if(!isNaN(pmax) && b.precio_sek > pmax) return false;
    if(!isNaN(mmin) && b.metros < mmin) return false;
    if(!isNaN(mmax) && b.metros > mmax) return false;
    if(fD && b.diesel!==true) return false;
    if(fI && b.intraborda!==true) return false;
    if(fF && b.fibra!==true) return false;
    if(fH && b.habitable!==true) return false;
    return true;
  });

  const cmp = {
    score:(a,b)=> b.score-a.score || a.precio_sek-b.precio_sek,
    precio:(a,b)=> a.precio_sek-b.precio_sek,
    precio_desc:(a,b)=> b.precio_sek-a.precio_sek,
    metros_desc:(a,b)=> b.metros-a.metros,
    year_desc:(a,b)=> (b.year||0)-(a.year||0),
  }[orden];
  list.sort(cmp);

  document.getElementById('conteo').textContent = `${list.length} / ${BARCOS.length} veleros`;

  if(!list.length){ grid.innerHTML = '<div class="vacio">Sin resultados con esos filtros.</div>'; return; }

  grid.innerHTML = list.map(b=>{
    const sc = b.score>=100 ? 's1' : b.score>=85 ? 's2' : '';
    return `<div class="card">
      <div class="top">
        <div class="score ${sc}">${b.score}</div>
        <div class="tit">${b.titulo}</div>
      </div>
      <div class="meta">
        <span class="precio">${fmt(b.precio_sek)} kr</span> <span class="eur">≈ ${fmt(b.precio_eur)} €</span><br>
        ${b.metros} m (${b.pies} ft) · ${b.year||'?'} · ${b.make||'—'}<br>
        📍 ${b.ubicacion||'—'} · ${b.vendedor||''}${b.motortyp?(' · '+b.motortyp):''}
      </div>
      <div class="chips">
        ${chip('diésel',b.diesel)} ${chip('intraborda',b.intraborda)}
        ${chip('fibra',b.fibra)} ${chip('habitable',b.habitable)}
      </div>
      <div class="acc"><a href="${b.url}" target="_blank">Ver en Blocket →</a></div>
    </div>`;
  }).join('');
}

['q','pmax','mmin','mmax','fDiesel','fIntra','fFibra','fHab','orden'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener(el.type==='checkbox'||el.tagName==='SELECT'?'change':'input', render);
});
render();
</script>
